name: labor_day_pay_calculator
description: "Work day pay calculator with multi-country tax support"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  fl_chart: ^0.70.2
  table_calendar: ^3.1.3
  provider: ^6.1.2
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.4
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  local_auth: ^2.3.0
  crypto: ^3.0.5
  google_sign_in: ^6.2.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Launcher icon generator.
# 1. Place a 1024x1024 PNG at assets/icon/app_icon.png
# 2. Run: flutter pub get && dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
